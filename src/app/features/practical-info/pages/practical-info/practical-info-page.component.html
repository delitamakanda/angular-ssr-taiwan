@if (page()) {
  <article class="mx-auto px-4 py-10">
    @if (page()?.cover_image_url) {
      <div class="relative z-10">
        <img [src]="page()?.cover_image_url" alt="Image" class="object-cover w-full h-64" />
      </div>
    } @else {
      <div class="relative z-10">
        <img src="https://via.placeholder.com/1920x1080" alt="Image" class="object-cover w-full h-64" />
        <div class="absolute top-0 left-0 w-full h-full bg-gray-800 opacity-50"></div>
      </div>
    }
    <h1 class="text-3xl font-bold mb-6">{{ page()?.title }}</h1>
    <div class="text-lg text-gray-700 mb-6" [innerHTML]="page()?.content"></div>
  </article>
}
