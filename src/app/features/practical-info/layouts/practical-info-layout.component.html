<div class="space-y-8">
  <div class="space-y-4">
    <a routerLink="/" class="inline-flex items-center text-sm text-gray-600 hover:text-black transition">
      < back to home
    </a>
    <h1 class="text-4xl font-bold tracking-tight">Practical infos</h1>
  </div>
    <nav class="flex flex-wrap gap-2">
      @if(store.loading()) {
        <p>Loading...</p>
      } @else if (!store.items().length) {
        <p>No items found.</p>
      } @else {
        @for(item of store.items(); track item.id) {
          <a
            [routerLink]="item.slug"
            routerLinkActive="border-black text-black"
            class="rounded-full px-4 py-2 text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200 transition"
          >
            {{ item.title }}
          </a>
        }
      }
    </nav>

  <div class="py-4">
    <router-outlet />
  </div>
</div>
