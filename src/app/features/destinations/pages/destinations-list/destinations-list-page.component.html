<section class="space-y-6">
  <div class="space-y-2">
    <h1 class="text-3xl font-bold">Destinations</h1>
    <p class="text-gray-600">
      Filter destinations by name, country, or price range.
    </p>

    @if (store.loading()) {
      <p>loading...</p>
    } @else if (!store.filteredItems().length) {
      <p>No destinations found.</p>
    } @else {
      <div class="grid grid-cols-2 gap-4">
        @for (item of store.filteredItems(); track item.id) {
          <app-destination-card [destination]="item" />
        }
      </div>
    }
  </div>
</section>
