<section class="space-y-8">
  <a
    routerLink="/blog"
    class="inline-flex items-center text-sm text-gray-600 hover:text-black"
  >
    < Retour aux articles
  </a>

  @if (store.loading()) {
    <div class="space-y-4">
      <div class="h-80 w-full rounded-3xl bg-gray-200 animate-pulse"></div>
      <div class="h-8 w-1/3 rounded bg-gray-200 animate-pulse"></div>
      <div class="h-4 w-2/3 rounded bg-gray-200 animate-pulse"></div>
      <div class="h-4 w-full rounded bg-gray-200 animate-pulse"></div>
      <div class="h-4 w-full rounded bg-gray-200 animate-pulse"></div>
    </div>
  } @else if (store.error()) {
    <div class="rounded-2xl border border-red-200 bg-red-50 p-6 text-red-700">
      {{ store.error() }}
    </div>
  } @else if (article(); as item) {
    <article class="space-y-8">
      <header class="space-y-6">
        @if (item.cover_image_url) {
          <img
            [src]="item.cover_image_url"
            [alt]="item.title"
            class="h-[420px] w-full rounded-3xl object-cover"
          />
        } @else {
          <div class="h-[420px] w-full rounded-3xl bg-gray-200"></div>
        }

        <div class="space-y-4">
          <div class="flex flex-wrap items-center gap-3">
            <h1 class="text-4xl font-bold tracking-tight">
              {{ item.title }}
            </h1>
          </div>

          @if (item.excerpt) {
            <p class="max-w-3xl text-lg text-gray-600">
              {{ item.excerpt | stripHtml }}
            </p>
          }
        </div>
      </header>

      <section class="grid gap-8 lg:grid-cols-[2fr_1fr]">
        <div class="space-y-6">
          <div
            class="prose prose-gray max-w-none"
            [innerHTML]="item.content"
          ></div>
        </div>
      </section>
    </article>
  }
</section>
