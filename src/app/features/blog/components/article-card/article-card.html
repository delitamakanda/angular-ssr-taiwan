<a class="block overflow-hidden rounded-2xl border bg-white shadow-sm hover:shadow-md transition" [routerLink]="['/blog', post().slug]">
  @if (post().cover_image_url) {
    <img class="object-cover w-full h-48" [src]="post().cover_image_url" [lazy]="post().cover_image_url!" fetchpriority="high"
         [attr.loading]="priority() === 'high' ? 'eager' : 'lazy'"  alt="{{ post().title }}">
  } @else {
    <div class="h-48 bg-gradient-to-r from-blue-500 to-blue-700"></div>
  }

  <div class="p-4 space-y-2">
    <div class="flex items-center justify-between gap-3">
      <h2 class="lg font-bold">{{ post().title }}</h2>
    </div>

    <p class="text-sm text-gray-600">
      {{ post().excerpt | stripHtml }}
    </p>
  </div>
</a>
